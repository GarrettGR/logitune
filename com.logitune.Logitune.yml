app-id: com.logitune.Logitune
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: logitune

finish-args:
  # X11 + Wayland display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

  # D-Bus access for KWin focus tracking and KDE global shortcuts
  - --talk-name=org.kde.KWin
  - --talk-name=org.kde.kglobalaccel
  - --own-name=com.logitune.app

  # HID++ device access (hidraw)
  - --device=all

  # System tray
  - --talk-name=org.kde.StatusNotifierWatcher

  # udev for device discovery
  - --system-talk-name=org.freedesktop.UDisks2

  # Host .desktop files and icons for per-app profile picker
  - --filesystem=host-os:ro
  - --filesystem=/var/lib/flatpak:ro
  - --filesystem=xdg-data/applications:ro
  - --filesystem=xdg-data/flatpak/exports/share/applications:ro
  - --filesystem=/var/lib/snapd/desktop/applications:ro

  # User config for profiles — persist-path maps the host config into the sandbox
  # so native and Flatpak builds share the same profiles
  - --persist=.config/Logitune
  - --persist=.local/share/Logitune
  - --filesystem=~/.config/Logitune:create
  - --filesystem=~/.local/share/Logitune:create

  # Temp files for KWin script and logs
  - --filesystem=/tmp:create

modules:
  - name: logitune
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    sources:
      - type: dir
        path: .
